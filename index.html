<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 45%, #24243e 100%);
      min-height: 100vh;
      padding: 2rem 1.25rem 3rem;
      position: relative;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -80px; right: -80px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(236,72,153,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 800;
      background: linear-gradient(90deg, #f9a8d4, #c084fc, #818cf8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .player {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 16px 20px;
      max-width: 420px;
      margin: 0 auto 2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      z-index: 1;
    }

    .player-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }

    .play-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(129,140,248,0.5);
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .play-btn:hover { transform: scale(1.1); }
    .play-btn:active { transform: scale(0.96); }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 4px 20px rgba(129,140,248,0.5), 0 0 0 0px rgba(192,132,252,0.7); }
      70%  { box-shadow: 0 4px 20px rgba(129,140,248,0.5), 0 0 0 14px rgba(192,132,252,0); }
      100% { box-shadow: 0 4px 20px rgba(129,140,248,0.5), 0 0 0 0px rgba(192,132,252,0); }
    }

    @keyframes heartbeat {
      0%   { transform: scale(1);    }
      15%  { transform: scale(1.35); }
      30%  { transform: scale(1);    }
      45%  { transform: scale(1.2);  }
      65%  { transform: scale(1);    }
      100% { transform: scale(1);    }
    }

    #playIcon { display: inline-block; }

    .play-btn.playing               { animation: pulse-ring 1.2s ease-in-out infinite; }
    .play-btn.playing #playIcon     { animation: heartbeat  1.2s ease-in-out infinite; }
    .play-btn.paused                { animation: none; }
    .play-btn.paused  #playIcon     { animation: none; }

    .progress-row { display: flex; align-items: center; gap: 10px; }

    .progress-wrap {
      flex: 1; height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #f9a8d4, #c084fc, #818cf8);
      border-radius: 10px;
      transition: width 0.25s linear;
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      right: -4px; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(192,132,252,0.8);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .progress-wrap:hover .progress-bar::after { opacity: 1; }

    .time { font-size: 11px; color: rgba(255,255,255,0.4); min-width: 32px; text-align: right; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .card {
      border-radius: 18px;
      padding: 1.4rem 1rem 1.15rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .card:hover { transform: translateY(-5px) scale(1.02); }
    .card:active { transform: scale(0.97); }

    .card-party  { background: linear-gradient(145deg, #ff758c, #ff4b6a, #c0143c); }
    .card-chill  { background: linear-gradient(145deg, #43e0f3, #1aa8d4, #0d5f8a); }
    .card-love   { background: linear-gradient(145deg, #f472b6, #e0198a, #8b0062); }
    .card-dance  { background: linear-gradient(145deg, #fbbf24, #f59e0b, #b45309); }
    .card-90s    { background: linear-gradient(145deg, #a78bfa, #7c3aed, #4c1d95); }
    .card-dev    { background: linear-gradient(145deg, #34d399, #059669, #065f46); }

    .emoji      { font-size: 30px; position: relative; z-index: 1; }
    .card-title { font-size: 14px; font-weight: 800; color: #fff; letter-spacing: 0.5px; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
    .card-sub   { font-size: 10px; color: rgba(255,255,255,0.65); text-align: center; }

    .btn {
      margin-top: 2px;
      padding: 6px 16px;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 40px;
      cursor: pointer;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
      position: relative;
      z-index: 2;
    }

    .btn:hover  { background: rgba(0,0,0,0.4); }
    .btn:active { transform: scale(0.95); }

    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: linear-gradient(160deg, #1e1b4b, #1e1335);
      border: 1px solid rgba(192,132,252,0.3);
      border-radius: 22px;
      width: 100%; max-width: 380px; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 15px; font-weight: 800; color: #fff;
      display: flex; align-items: center; gap: 8px;
    }

    .modal-badge {
      font-size: 10px; font-weight: 700;
      background: linear-gradient(90deg, #c084fc, #818cf8);
      color: #fff; padding: 3px 8px; border-radius: 20px;
    }

    .modal-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: none;
      color: rgba(255,255,255,0.6); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    .modal-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

    .modal-list {
      overflow-y: auto; padding: 10px 12px 14px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(192,132,252,0.4) transparent;
    }

    .modal-list::-webkit-scrollbar       { width: 4px; }
    .modal-list::-webkit-scrollbar-track { background: transparent; }
    .modal-list::-webkit-scrollbar-thumb { background: rgba(192,132,252,0.4); border-radius: 10px; }

    .track-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .track-item:hover  { background: rgba(192,132,252,0.15); border-color: rgba(192,132,252,0.35); transform: translateX(3px); }
    .track-item.active { background: rgba(192,132,252,0.22); border-color: rgba(192,132,252,0.55); }

    .track-num  { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.25); min-width: 20px; text-align: center; }
    .track-item.active .track-num { color: #c084fc; }

    .track-info { flex: 1; min-width: 0; }

    .track-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-item.active .track-name { color: #fff; }

    .track-file { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 1px; font-family: monospace; }

    .track-play-icon { font-size: 13px; color: rgba(255,255,255,0.2); transition: color 0.15s; }
    .track-item:hover .track-play-icon,
    .track-item.active .track-play-icon { color: #c084fc; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🎵 Music</h1>
    <p>Enjoy every second with music🎧</p>
  </div>

  <div class="player">
    <div class="player-top">
      <button class="play-btn paused" id="playBtn" onclick="togglePlay()">
        <span id="playIcon">💔</span>
      </button>
      <div class="song-info">
        <div class="song-name" id="songName">No track selected</div>
        <div class="song-label" id="songLabel">Pick a category below</div>
      </div>
    </div>
    <div class="progress-row">
      <div class="progress-wrap" onclick="seek(event)">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <span class="time" id="timeDisplay">0:00</span>
    </div>
    <audio id="audioPlayer"></audio>
  </div>

  <div class="grid">
    <div class="card card-party" onclick="openModal('party')">
      <span class="emoji">🎉</span>
      <span class="card-title">Party</span>
      <span class="card-sub">High energy beats</span>
      <button class="btn">▶ Play</button>
    </div>
    <div class="card card-chill" onclick="openModal('chill')">
      <span class="emoji">😌</span>
      <span class="card-title">Chill</span>
      <span class="card-sub">Relax &amp; unwind</span>
      <button class="btn">▶ Play</button>
    </div>
    <div class="card card-love" onclick="openModal('love')">
      <span class="emoji">💗</span>
      <span class="card-title">Love</span>
      <span class="card-sub">Romantic vibes</span>
      <button class="btn">▶ Play</button>
    </div>
    <div class="card card-dance" onclick="openModal('dance')">
      <span class="emoji">💃</span>
      <span class="card-title">Dance</span>
      <span class="card-sub">Move your body</span>
      <button class="btn">▶ Play</button>
    </div>
    <div class="card card-90s" onclick="openModal('90s')">
      <span class="emoji">🎶</span>
      <span class="card-title">90s</span>
      <span class="card-sub">Classic nostalgia</span>
      <button class="btn">▶ Play</button>
    </div>
    <div class="card card-dev" onclick="openModal('devotional')">
      <span class="emoji">🙏</span>
      <span class="card-title">Devotional</span>
      <span class="card-sub">Peace &amp; spirit</span>
      <button class="btn">▶ Play</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">
          <span id="modalEmoji">🎉</span>
          <span id="modalTitle">Party</span>
          <span class="modal-badge" id="modalCount">5 songs</span>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-list" id="modalList"></div>
    </div>
  </div>

  <script>
    const playlists = {

      love: {
        emoji: '❤️',
        label: 'Love',
        songs: [
          { name: 'My Love Is Gone', file: 'my-love-is-gone.mp3' },
          { name: 'Uppenantha', file: 'uppenantha.mp3' },
          { name: 'Feel My Love', file: 'feel-my-love.mp3' },
          { name: 'I Manoharudu', file: 'i-manoharudu.mp3' },
          { name: 'Konchem Konchem', file: 'konchem-konchem.mp3' },
          { name: 'Pillaa Raa', file: 'pillaa-raa.mp3' },
          { name: 'Uppena Nee Kannu', file: 'uppena-nee-kannu.mp3' },
          { name: 'Uyyaala Jampala', file: 'uyyaala-jampala.mp3' }
        ]
      },

      chill: {
        emoji: '😌',
        label: 'Chill',
        songs: [
          { name: 'Gehra Hua', file: 'gehra-hua.mp3' },
          { name: 'Godavari Songs', file: 'godavari.mp3' },
          { name: 'Inthandham', file: 'inthandham.mp3' },
          { name: 'Mila Mila', file: 'mila-mila.mp3' },
          { name: 'Nuvvena', file: 'nuvvena.mp3' },
          { name: 'Oohalu Gusagusalade', file: 'oohalu-gusagusalade.mp3' }
        ]
      },

      dance: {
        emoji: '💃',
        label: 'Dance',
        songs: [
          { name: 'Athiloka Sundari', file: 'athiloka-sundari.mp3' },
          { name: 'Diyyalo Diyyala', file: 'diyyalo-diyyala.mp3' },
          { name: 'Killi Killi', file: 'killi-killi.mp3' },
          { name: 'Pakka Local', file: 'pakka-local.mp3' },
          { name: 'Swing Zara', file: 'swing-zara.mp3' }
        ]
      },

      party: {
        emoji: '🎉',
        label: 'Party',
        songs: [
          { name: 'Ringa Ringa', file: 'ringa-ringa.mp3' },
          { name: 'Come to the Party', file: 'come-to-the-party.mp3' },
          { name: 'Top Lesi Poddi', file: 'top-lesi-poddi.mp3' },
          { name: 'Jigelu Rani', file: 'jigelu-rani.mp3' },
          { name: 'Super Machi', file: 'super-machi.mp3' }
        ]
      },

      /* FIX 1: was 'nineties' — renamed to '90s' to match openModal('90s') on the card */
      '90s': {
        emoji: '🎼',
        label: '90s Hits',
        songs: [
          { name: 'Jada Saram', file: 'jada-saram.mp3' },
          { name: 'Allanthaa Doorala', file: 'allanthaa-doorala.mp3' },
          { name: 'Kammani Ee Prema', file: 'kammani-ee-prema.mp3' },
          { name: 'Naa Cheli Rojave', file: 'naa-cheli-rojave.mp3' },
          { name: 'Sanam Yeh Raatein', file: 'sanam-yeh-raatein.mp3' }
        ]
      },

      /* FIX 2: was missing entirely — added so Devotional card works */
      devotional: {
        emoji: '🙏',
        label: 'Devotional',
        songs: [
          { name: 'Annamayya Keerthana', file: 'annamayya-keerthana.mp3' },
          { name: 'Govinda Govinda', file: 'govinda-govinda.mp3' },
          { name: 'Om Namah Shivaya', file: 'om-namah-shivaya.mp3' },
          { name: 'Suprabhatam', file: 'suprabhatam.mp3' },
          { name: 'Venkateswara Suprabhatam', file: 'venkateswara-suprabhatam.mp3' }
        ]
      }

    };

    const audio     = document.getElementById('audioPlayer');
    const playBtn   = document.getElementById('playBtn');
    const playIcon  = document.getElementById('playIcon');
    const bar       = document.getElementById('progressBar');
    const timEl     = document.getElementById('timeDisplay');
    const songName  = document.getElementById('songName');
    const songLabel = document.getElementById('songLabel');

    let currentCategory = null;
    let currentTrack    = -1;
    let isPlaying       = false;

    function fmt(s) {
      const m = Math.floor(s / 60);
      return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    }

    function showHeart() {
      playIcon.textContent = '❤️';
      playBtn.classList.remove('paused');
      playBtn.classList.add('playing');
    }

    function showBrokenHeart() {
      playIcon.textContent = '💔';
      playBtn.classList.remove('playing');
      playBtn.classList.add('paused');
    }

    function togglePlay() {
      if (currentTrack < 0) return;
      if (isPlaying) {
        isPlaying = false;
        showBrokenHeart();
        audio.pause();
      } else {
        isPlaying = true;
        showHeart();
        audio.play().catch(() => {});
      }
    }

    audio.addEventListener('ended', () => {
      const songs = playlists[currentCategory]?.songs || [];
      if (currentTrack < songs.length - 1) {
        playTrack(currentCategory, currentTrack + 1);
      } else {
        isPlaying = false;
        showBrokenHeart();
        bar.style.width = '0%';
        timEl.textContent = '0:00';
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        bar.style.width = (audio.currentTime / audio.duration * 100) + '%';
        timEl.textContent = fmt(audio.currentTime);
      }
    });

    function seek(e) {
      if (!audio.duration) return;
      const r = e.currentTarget.getBoundingClientRect();
      audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    }

    function openModal(cat) {
      const p = playlists[cat];
      if (!p) return;
      document.getElementById('modalEmoji').textContent = p.emoji;
      document.getElementById('modalTitle').textContent = p.label;
      document.getElementById('modalCount').textContent = p.songs.length + ' songs';

      const list = document.getElementById('modalList');
      list.innerHTML = '';
      p.songs.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'track-item' + (currentCategory === cat && currentTrack === i ? ' active' : '');
        el.innerHTML =
          '<span class="track-num">' + (i + 1) + '</span>' +
          '<div class="track-info">' +
            '<div class="track-name">' + s.name + '</div>' +
            '<div class="track-file">' + s.file + '</div>' +
          '</div>' +
          '<span class="track-play-icon">▶</span>';
        el.onclick = () => { playTrack(cat, i); closeModal(); };
        list.appendChild(el);
      });

      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function overlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    function playTrack(cat, idx) {
      currentCategory = cat;
      currentTrack    = idx;
      isPlaying       = true;

      const s = playlists[cat].songs[idx];
      audio.src ="songs/"+ s.file;
      audio.load();
      audio.play().catch(() => {});

      songName.textContent  = s.name;
      songLabel.textContent = playlists[cat].label + ' • Track ' + (idx + 1);

      showHeart();
    }
  </script>
</body>
</html>
